services:

  # ─────────────────────────────────────────────
  # HDFS + YARN  (identico al Taller 2)
  # ─────────────────────────────────────────────

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: hadoop-namenode
    hostname: namenode
    restart: unless-stopped
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode_data:/hadoop/dfs/name
      - ./data:/workspace/data:ro
    env_file:
      - ./config/hadoop.env
    environment:
      CLUSTER_NAME: taller-spark

  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: hadoop-datanode1
    hostname: datanode1
    restart: unless-stopped
    ports:
      - "9864:9864"
    volumes:
      - datanode1_data:/hadoop/dfs/data
    env_file:
      - ./config/hadoop.env
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    depends_on:
      - namenode

  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: hadoop-datanode2
    hostname: datanode2
    restart: unless-stopped
    ports:
      - "9865:9864"
    volumes:
      - datanode2_data:/hadoop/dfs/data
    env_file:
      - ./config/hadoop.env
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    depends_on:
      - namenode

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: hadoop-resourcemanager
    hostname: resourcemanager
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      - rmstate_data:/rmstate
    env_file:
      - ./config/hadoop.env
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode1:9864 datanode2:9864"
    depends_on:
      - namenode
      - datanode1
      - datanode2

  nodemanager1:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: hadoop-nodemanager1
    hostname: nodemanager1
    restart: unless-stopped
    env_file:
      - ./config/hadoop.env
    environment:
      SERVICE_PRECONDITION: "resourcemanager:8088 namenode:9000"
    depends_on:
      - resourcemanager

  nodemanager2:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: hadoop-nodemanager2
    hostname: nodemanager2
    restart: unless-stopped
    env_file:
      - ./config/hadoop.env
    environment:
      SERVICE_PRECONDITION: "resourcemanager:8088 namenode:9000"
    depends_on:
      - resourcemanager

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: hadoop-historyserver
    hostname: historyserver
    restart: unless-stopped
    ports:
      - "19888:19888"
    volumes:
      - historyserver_data:/hadoop/yarn/timeline
    env_file:
      - ./config/hadoop.env
    environment:
      SERVICE_PRECONDITION: "namenode:9000 resourcemanager:8088"
    depends_on:
      - namenode
      - resourcemanager

  # ─────────────────────────────────────────────
  # Spark Standalone
  # ─────────────────────────────────────────────

  spark-master:
    image: bitnami/spark:3.5
    platform: linux/amd64
    container_name: spark-master
    hostname: spark-master
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./data:/workspace/data:ro
      - ./jobs:/jobs:ro
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
    depends_on:
      - namenode

  spark-worker-1:
    image: bitnami/spark:3.5
    platform: linux/amd64
    container_name: spark-worker-1
    hostname: spark-worker-1
    restart: unless-stopped
    volumes:
      - ./data:/workspace/data:ro
      - ./jobs:/jobs:ro
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: 2
    depends_on:
      - spark-master

  spark-worker-2:
    image: bitnami/spark:3.5
    platform: linux/amd64
    container_name: spark-worker-2
    hostname: spark-worker-2
    restart: unless-stopped
    volumes:
      - ./data:/workspace/data:ro
      - ./jobs:/jobs:ro
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: 2
    depends_on:
      - spark-master

volumes:
  namenode_data:
  datanode1_data:
  datanode2_data:
  rmstate_data:
  historyserver_data:
